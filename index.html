<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Дизайн синк — кто отвечает?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #14141c;
    color: #fff;
    overflow: hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }
  body { display: flex; align-items: center; justify-content: center; }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #5a8a3a;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7);
  }
  #pick {
    position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
    padding: 16px 32px;
    border: 3px solid #fff;
    background: #c04040;
    color: #fff;
    font-family: 'Press Start 2P', ui-monospace, monospace;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 6px 0 #802020, 0 8px 24px rgba(0,0,0,0.5);
    text-shadow: 2px 2px 0 #602020;
    transition: transform 0.08s, box-shadow 0.08s, opacity 0.3s;
  }
  #pick:hover:not(:disabled) {
    transform: translateX(-50%) translateY(-2px);
    box-shadow: 0 8px 0 #802020, 0 12px 28px rgba(0,0,0,0.5);
  }
  #pick:active:not(:disabled) {
    transform: translateX(-50%) translateY(4px);
    box-shadow: 0 2px 0 #802020;
  }
  #pick:disabled { opacity: 0.4; cursor: not-allowed; }
  #reveal {
    position: fixed; inset: 0;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 5;
  }
  #reveal.show { opacity: 1; pointer-events: auto; }
  #reveal .card {
    background: rgba(20, 20, 30, 0.88);
    border: 4px solid #fff;
    padding: 32px 48px 28px;
    text-align: center;
    box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(0,0,0,0.4);
    transform: translateY(80px) scale(0.9);
    transition: transform 0.5s cubic-bezier(0.2, 1.2, 0.3, 1);
    min-width: 320px;
  }
  #reveal.show .card { transform: translateY(80px) scale(1); }
  #reveal .label {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #80c0ff;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }
  #reveal .name {
    font-family: 'Press Start 2P', monospace;
    font-size: 30px;
    color: #ffd040;
    margin-bottom: 14px;
    text-shadow: 4px 4px 0 #604010, 0 0 20px rgba(255,208,64,0.4);
  }
  #reveal .activity {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 17px;
    color: #d8d8d8;
    margin-bottom: 26px;
  }
  #close {
    padding: 12px 22px;
    border: 2px solid #fff;
    background: #4060c0;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    box-shadow: 0 4px 0 #203080;
    letter-spacing: 1px;
  }
  #close:hover { background: #5070d0; }
  #close:active { transform: translateY(2px); box-shadow: 0 2px 0 #203080; }
  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    font-family: ui-monospace, monospace;
    letter-spacing: 1px;
  }
  #settings {
    position: fixed; bottom: 18px; right: 18px;
    width: 46px; height: 46px;
    border: 2px solid #fff;
    background: #2a2a40;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 4px 0 #000, 0 6px 16px rgba(0,0,0,0.5);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  #settings:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #000, 0 8px 20px rgba(0,0,0,0.5); }
  #settings:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 340px;
    background: rgba(18, 18, 28, 0.97);
    border-left: 3px solid #fff;
    padding: 22px 18px 18px;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.2, 1, 0.3, 1);
    z-index: 20;
    display: flex; flex-direction: column;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  }
  #panel.open { transform: translateX(0); }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #ffd040;
    letter-spacing: 1px;
  }
  #close-panel {
    width: 30px; height: 30px;
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    cursor: pointer;
    font-size: 16px;
    font-family: monospace;
  }
  #close-panel:hover { background: rgba(255,255,255,0.1); }
  .toggle-row {
    display: grid;
    grid-template-columns: 24px 1fr;
    grid-template-rows: auto auto;
    column-gap: 10px;
    align-items: center;
    padding: 12px;
    margin-bottom: 12px;
    background: rgba(128, 192, 255, 0.06);
    border: 1px solid rgba(128, 192, 255, 0.2);
    cursor: pointer;
    user-select: none;
  }
  .toggle-row input {
    grid-row: 1 / 3;
    width: 18px; height: 18px;
    accent-color: #80c0ff;
    cursor: pointer;
  }
  .toggle-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #80c0ff;
    letter-spacing: 1px;
  }
  .toggle-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }
  #reset-round {
    padding: 10px;
    border: 2px solid #ffd040;
    background: rgba(255, 208, 64, 0.08);
    color: #ffd040;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    cursor: pointer;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  #reset-round:hover { background: rgba(255, 208, 64, 0.2); }
  .char-row.picked {
    opacity: 0.4;
    background: rgba(255,255,255,0.02);
  }
  .char-row.picked .char-name {
    text-decoration: line-through;
    color: rgba(255,255,255,0.5);
  }
  .char-row .picked-mark {
    display: none;
    color: #80ff80;
    font-size: 13px;
    margin-right: 4px;
  }
  .char-row.picked .picked-mark { display: inline; }
  #char-list {
    flex: 1;
    overflow-y: auto;
    margin-right: -6px;
    padding-right: 6px;
  }
  #char-list::-webkit-scrollbar { width: 6px; }
  #char-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
  .char-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .char-swatch {
    width: 28px; height: 44px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    flex-shrink: 0;
  }
  .char-info { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .char-name {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 6px 8px;
    font-family: ui-sans-serif, system-ui;
    font-size: 14px;
  }
  .char-name:focus { border-color: #80c0ff; outline: none; background: rgba(128,192,255,0.06); }
  .char-station {
    font-size: 8px;
    color: rgba(255,255,255,0.4);
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .char-station-select {
    width: 100%;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #d8d8d8;
    padding: 4px 6px;
    font-family: ui-sans-serif, system-ui;
    font-size: 11px;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, #888 50%), linear-gradient(135deg, #888 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    padding-right: 22px;
  }
  .char-station-select:hover { border-color: rgba(128, 192, 255, 0.4); }
  .char-station-select:focus { border-color: #80c0ff; outline: none; }
  .char-station-select option {
    background: #14141c;
    color: #fff;
    font-family: ui-sans-serif, system-ui;
  }
  .char-remove {
    width: 28px; height: 28px;
    background: transparent;
    color: #c06060;
    border: 1px solid rgba(192, 96, 96, 0.4);
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
  }
  .char-remove:hover { background: rgba(192, 64, 64, 0.2); color: #ff8080; }
  .char-remove:disabled { opacity: 0.2; cursor: not-allowed; }
  #add-char {
    padding: 14px;
    border: 2px dashed rgba(255,255,255,0.3);
    background: transparent;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    margin-top: 10px;
    letter-spacing: 1px;
  }
  #add-char:hover { background: rgba(255,255,255,0.06); border-color: #fff; }
  .panel-foot {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="pick">КТО ОТВЕЧАЕТ?</button>
<div id="reveal">
  <div class="card">
    <div class="label">ВЫБРАН</div>
    <div class="name"></div>
    <div class="activity"></div>
    <button id="close">ДАЛЬШЕ →</button>
  </div>
</div>
<div id="hint">пробел / клик — выбрать случайного   •   esc — закрыть</div>
<button id="settings" title="редактировать">⚙</button>
<div id="panel">
  <div class="panel-head">
    <span>УЧАСТНИКИ</span>
    <button id="close-panel">×</button>
  </div>
  <label class="toggle-row" id="mode-toggle-row">
    <input type="checkbox" id="no-repeat-toggle">
    <span class="toggle-label">КАЖДЫЙ ПО РАЗУ</span>
    <span class="toggle-hint">выбранный уходит в дом</span>
  </label>
  <button id="reset-round" style="display:none">↺ СБРОСИТЬ РАУНД</button>
  <div id="char-list"></div>
  <button id="add-char">+ ДОБАВИТЬ НОВОГО</button>
  <div class="panel-foot">сохраняется автоматически</div>
</div>

<script>
'use strict';

// =============================================================================
// CONFIG
// =============================================================================
const VW = 480, VH = 270;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  canvas.width = VW;
  canvas.height = VH;
  const scale = Math.min(window.innerWidth / VW, (window.innerHeight - 40) / VH);
  canvas.style.width = (VW * scale) + 'px';
  canvas.style.height = (VH * scale) + 'px';
  ctx.imageSmoothingEnabled = false;
}
setupCanvas();
window.addEventListener('resize', setupCanvas);

// =============================================================================
// SPRITE HELPER — build a canvas from a pixel-art string array
// =============================================================================
function makeSprite(pixels, palette) {
  const w = pixels[0].length;
  const h = pixels.length;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ch = pixels[y][x];
      const color = palette[ch];
      if (!color) continue;
      cx.fillStyle = color;
      cx.fillRect(x, y, 1, 1);
    }
  }
  return c;
}

// =============================================================================
// CHARACTER SPRITE — 14×22 fantasy chibi (wide hat, tunic + belt, boots)
// =============================================================================
const CHAR_IDLE = [
  '......HH......',
  '.....HHHH.....',
  '....HHHHHH....',
  '...HHHHHHHH...',
  'HHHHHHHHHHHHHH',
  '...ssssssss...',
  '...SSSSSSSS...',
  '..SSEESSEESS..',
  '..SSSSSSSSSS..',
  '...SSSmmSS....',
  '....CCCCCC....',
  '..CCCCCCCCCC..',
  '.CCcCCCCCCcCC.',
  '.CCCCCCCCCCCC.',
  '.CCCCCCCCCCCC.',
  '..BBBBBBBBBB..',
  '..LLCCCCCCLL..',
  '..LLLLLLLLLL..',
  '..LL......LL..',
  '..LL......LL..',
  '..LL......LL..',
  '..FF......FF..',
];

const CHAR_WALK = [
  '......HH......',
  '.....HHHH.....',
  '....HHHHHH....',
  '...HHHHHHHH...',
  'HHHHHHHHHHHHHH',
  '...ssssssss...',
  '...SSSSSSSS...',
  '..SSEESSEESS..',
  '..SSSSSSSSSS..',
  '...SSSmmSS....',
  '....CCCCCC....',
  '..CCCCCCCCCC..',
  '.CCcCCCCCCcCC.',
  '.CCCCCCCCCCCC.',
  '.CCCCCCCCCCCC.',
  '..BBBBBBBBBB..',
  '..LLCCCCCCLL..',
  '..LLLLLLLLLL..',
  '..LL......LL..',
  '..LL.....LLL..',
  '.LL........LL.',
  '.FF........FF.',
];

function makeChar(palette) {
  return {
    idle: makeSprite(CHAR_IDLE, palette),
    walk: makeSprite(CHAR_WALK, palette),
  };
}

function darken(hex, amt = 0.6) {
  const r = Math.max(0, Math.min(255, Math.floor(parseInt(hex.slice(1, 3), 16) * amt)));
  const g = Math.max(0, Math.min(255, Math.floor(parseInt(hex.slice(3, 5), 16) * amt)));
  const b = Math.max(0, Math.min(255, Math.floor(parseInt(hex.slice(5, 7), 16) * amt)));
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

// =============================================================================
// CHARACTERS — placeholder names, edited via panel and saved to localStorage
// =============================================================================
const DEFAULT_CHARACTERS = [
  { name: 'Аня',   station: 'kitchen',  colors: c('#3a2818','#f0c8a0','#c04040','#3a2858','#2a1a08') },
  { name: 'Боря',  station: 'bakery',   colors: c('#a06030','#f0c8a0','#e0a040','#5a3a18','#3a2010') },
  { name: 'Вика',  station: 'garden',   colors: c('#e0c060','#f0c8a0','#40a060','#604030','#2a1a08') },
  { name: 'Гриша', station: 'woodpile', colors: c('#5a3a18','#e0b890','#4060c0','#2a2050','#1a1008') },
  { name: 'Даша',  station: 'easel',    colors: c('#c04060','#f0c8a0','#a060c0','#403080','#2a1a08') },
  { name: 'Егор',  station: 'pond',     colors: c('#3a2818','#e0b890','#40a0c0','#3a3018','#1a1008') },
  { name: 'Женя',  station: 'bench',    colors: c('#e08040','#f0c8a0','#c0a040','#4a3a20','#2a1a08') },
  { name: 'Зоя',   station: 'campfire', colors: c('#2a1a08','#f0c8a0','#40c0a0','#2a4a3a','#1a1008') },
];

const STORAGE_KEY = 'pixel-sync-v1';
const SETTINGS_KEY = 'pixel-sync-settings-v1';
let CHARACTERS = [];
let noRepeatMode = false;

// Door positions — where the character's top-left lands so feet end up at door
const HOUSE_DOORS = [
  { x: 378, y: 114 },  // main house (top-right)
  { x: 368, y: 242 },  // cottage (bottom-right)
  { x: 36,  y: 102 },  // shed (top-left)
];

function nearestDoor(ch) {
  let best = HOUSE_DOORS[0], bestD = Infinity;
  for (const d of HOUSE_DOORS) {
    const dist = Math.hypot(d.x - ch.x, d.y - ch.y);
    if (dist < bestD) { bestD = dist; best = d; }
  }
  return best;
}

function c(hair, skin, shirt, pants, shoes) {
  return { hair, skin, shirt, pants, shoes };
}

function pal(colors) {
  return {
    H: colors.hair,                      // hat / hair main
    S: colors.skin,                      // skin
    s: darken(colors.skin, 0.78),        // skin shadow under hat brim
    E: '#1a0d08',                        // eye
    m: darken(colors.skin, 0.55),        // mouth
    C: colors.shirt,                     // tunic
    c: darken(colors.shirt, 0.72),       // tunic shading on sleeves
    B: '#4a3018',                        // belt (fixed leather brown)
    L: colors.pants,                     // pants
    F: colors.shoes,                     // boots
    '.': null,
  };
}

const WANDER_ACTIVITIES = [
  'наливает кофе',
  'смотрит в окно',
  'листает фигму',
  'идёт по своим делам',
  'делает вид что слушает',
  'обсуждает погоду',
  'отвечает в слаке',
  'просто гуляет',
  'ищет где зарядка',
  'идёт на встречу',
];

const RND_COLORS = {
  hair:  ['#3a2818','#a06030','#e0c060','#5a3a18','#c04060','#e08040','#2a1a08','#704020','#d0a060','#8050a0','#605040'],
  skin:  ['#f0c8a0','#e0b890','#d0a070','#f0d0b0','#c08868'],
  shirt: ['#c04040','#4060c0','#40a060','#c08040','#a060c0','#40c0c0','#c0a040','#806040','#e06030','#3080c0','#c04080','#609040'],
  pants: ['#3a2858','#5a3a18','#604030','#2a2050','#403080','#3a3018','#4a3a20','#2a4a3a','#502820'],
  shoes: ['#2a1a08','#1a1008','#3a2010'],
};

function instantiateChar(def) {
  const ch = {
    name: def.name,
    station: def.station,
    colors: { ...def.colors },
    activity: def.activity, // optional, used by wanderers
    palette: pal(def.colors),
    bobPhase: Math.random() * Math.PI * 2,
    walkPhase: 0,
    walking: false,
    wanderTarget: null,
    idleUntil: 0,
    // no-repeat mode state
    pickedThisRound: false,
    hidden: false,
    leaving: false,
    leavingTo: null,
    alpha: 1,
  };
  ch.sprite = makeChar(ch.palette);
  positionChar(ch, def);
  return ch;
}

function updateGardenRoutine(ch, dt, now) {
  if (ch.leaving) return;
  if (selectedChar === ch && state !== 'overview') {
    ch.walking = false;
    return;
  }
  if (!ch.routine) {
    ch.routine = { action: 'hoe', start: now, duration: 2 };
  }
  const r = ch.routine;
  if (now - r.start >= r.duration * 1000) {
    const bag = ['hoe', 'hoe', 'water', 'plant', 'rest', 'hoe', 'water'];
    let next = bag[Math.floor(Math.random() * bag.length)];
    if (next === r.action && Math.random() < 0.5) next = bag[Math.floor(Math.random() * bag.length)];
    r.action = next;
    r.start = now;
    r.duration = { hoe: 2.6, water: 3.2, plant: 1.8, rest: 1.6 }[next] || 2;
  }
  const s = STATIONS.garden;
  ch.x = s.x + s.charOffset.dx;
  ch.y = s.y + s.charOffset.dy;
  // small pose offset per action
  if (r.action === 'plant') ch.y += 3;
  else if (r.action === 'hoe') ch.y += Math.abs(Math.sin((now - r.start) / 1000 * 6)) * 1;
  else if (r.action === 'water') ch.y += Math.sin((now - r.start) / 1000 * 4) * 0.5;
  ch.walking = false;
}

function updateKitchenRoutine(ch, dt, now) {
  if (ch.leaving) return;
  if (selectedChar === ch && state !== 'overview') {
    ch.walking = false;
    return;
  }
  if (!ch.routine) {
    ch.routine = { action: 'stir', start: now, duration: 2, ingredient: '#e08030' };
  }
  const r = ch.routine;
  if (now - r.start >= r.duration * 1000) {
    const bag = ['stir', 'stir', 'add', 'blow', 'taste', 'stir', 'add'];
    let next = bag[Math.floor(Math.random() * bag.length)];
    if (next === r.action && Math.random() < 0.5) next = bag[Math.floor(Math.random() * bag.length)];
    r.action = next;
    r.start = now;
    r.duration = { stir: 3.0, add: 1.4, blow: 2.0, taste: 1.4 }[next] || 2;
    // pick random ingredient color for 'add'
    r.ingredient = ['#e08030', '#40a040', '#c04050', '#ffd040', '#a08060', '#c0a040'][Math.floor(Math.random() * 6)];
  }
  const s = STATIONS.kitchen;
  ch.x = s.x + s.charOffset.dx;
  ch.y = s.y + s.charOffset.dy;
  // pose offset per action
  if (r.action === 'blow') ch.y += 4;          // crouch to blow
  else if (r.action === 'taste') ch.y -= 1;    // lean back slightly
  else if (r.action === 'stir') ch.y += Math.sin((now - r.start) / 1000 * 3) * 0.5;
  ch.walking = false;
}

function updateCampfireRoutine(ch, dt, now) {
  if (ch.leaving) return;
  // freeze when this character is being focused so camera can converge
  if (selectedChar === ch && state !== 'overview') {
    ch.walking = false;
    return;
  }
  if (!ch.routine) {
    ch.routine = { action: 'idle', start: now, duration: 1500, dir: 1, circleDir: 1, circlePhase: ch.bobPhase || 0 };
  }
  const r = ch.routine;
  if (now - r.start >= r.duration * 1000) {
    // pick next action — weighted bag
    const bag = ['circle', 'circle', 'jump', 'dance', 'idle', 'dance'];
    let next = bag[Math.floor(Math.random() * bag.length)];
    if (next === r.action && Math.random() < 0.6) next = bag[Math.floor(Math.random() * bag.length)];
    r.action = next;
    r.start = now;
    r.duration = { circle: 4.5, jump: 1.1, dance: 3.2, idle: 2.4 }[next] || 2;
    r.dir = Math.random() < 0.5 ? 1 : -1;
    r.circleDir = Math.random() < 0.5 ? 1 : -1;
    r.circlePhase = Math.random() * Math.PI * 2;
  }
  const FX = STATIONS.campfire.x;          // fire center x
  const FY = STATIONS.campfire.y;          // fire center y
  const phase = Math.min(1, (now - r.start) / 1000 / r.duration);

  switch (r.action) {
    case 'circle': {
      const angle = ((now - r.start) / 1000) * 2.4 * r.circleDir + r.circlePhase;
      const radius = 24;
      ch.x = FX + Math.cos(angle) * radius - 7;
      ch.y = FY + Math.sin(angle) * radius * 0.48 - 16;
      ch.walking = true;
      ch.walkPhase += dt * 9;
      break;
    }
    case 'jump': {
      const startX = FX - r.dir * 22 - 7;
      const endX   = FX + r.dir * 22 - 7;
      ch.x = startX + (endX - startX) * phase;
      ch.y = FY - 12 - Math.sin(phase * Math.PI) * 20;
      ch.walking = true;
      ch.walkPhase += dt * 14;
      break;
    }
    case 'dance': {
      const t = (now - r.start) / 1000 * 7;
      ch.x = FX + 16 - 7 + Math.sin(t) * 6;
      ch.y = FY - 8 + Math.abs(Math.cos(t)) * -3;   // little hop
      ch.walking = Math.sin(t * 2) > 0;
      ch.walkPhase += dt * 8;
      break;
    }
    case 'idle':
    default: {
      const s = STATIONS.campfire;
      ch.x = s.x + s.charOffset.dx;
      ch.y = s.y + s.charOffset.dy;
      ch.walking = false;
      break;
    }
  }
}

function updateLeavingChar(ch, dt) {
  if (!ch.leavingTo) return;
  const dx = ch.leavingTo.x - ch.x;
  const dy = ch.leavingTo.y - ch.y;
  const d = Math.hypot(dx, dy);
  if (d < 2) {
    ch.leaving = false;
    ch.hidden = true;
    ch.walking = false;
    ch.alpha = 0;
    // auto reset when everyone has been picked
    if (CHARACTERS.every(c => c.pickedThisRound)) {
      setTimeout(resetRound, 1800);
    }
  } else {
    const speed = 36;
    ch.x += (dx / d) * speed * dt;
    ch.y += (dy / d) * speed * dt;
    ch.walking = true;
    ch.walkPhase += dt * 7;
    // fade out as approaching door
    ch.alpha = Math.max(0, Math.min(1, (d - 6) / 22));
  }
}

function assignStation(ch, newStation) {
  if (ch.station === newStation) return;
  ch.station = newStation;
  // refresh picked/hidden state so they re-enter the scene
  ch.pickedThisRound = false;
  ch.hidden = false;
  ch.leaving = false;
  ch.leavingTo = null;
  ch.alpha = 1;
  ch.walking = false;
  ch.wanderTarget = null;
  if (newStation === 'wander') {
    ch.activity = rnd(WANDER_ACTIVITIES);
    ch.wanderHome = pickWanderHome();
    ch.x = ch.wanderHome.x;
    ch.y = ch.wanderHome.y;
    ch.idleUntil = 0;
  } else {
    ch.activity = undefined;
    ch.wanderHome = undefined;
    const s = STATIONS[newStation];
    // small horizontal stack offset if other chars already on this station
    const others = CHARACTERS.filter(c => c !== ch && c.station === newStation && !c.hidden).length;
    ch.x = s.x + s.charOffset.dx + others * 14;
    ch.y = s.y + s.charOffset.dy;
  }
  saveToStorage();
}

function resetRound() {
  for (const ch of CHARACTERS) {
    ch.pickedThisRound = false;
    ch.hidden = false;
    ch.leaving = false;
    ch.leavingTo = null;
    ch.alpha = 1;
    ch.walking = false;
    ch.wanderTarget = null;
    // teleport back to start position
    if (ch.station === 'wander') {
      ch.x = ch.wanderHome.x;
      ch.y = ch.wanderHome.y;
    } else {
      const s = STATIONS[ch.station];
      ch.x = s.x + s.charOffset.dx;
      ch.y = s.y + s.charOffset.dy;
    }
  }
  if (typeof rebuildPanel === 'function') rebuildPanel();
}

function positionChar(ch, def) {
  if (ch.station === 'wander') {
    let home = def.wanderHome ? { ...def.wanderHome } : null;
    if (!home || !isValidWanderPos(home.x, home.y)) home = pickWanderHome();
    ch.wanderHome = home;
    ch.x = home.x;
    ch.y = home.y;
  } else {
    const s = STATIONS[ch.station];
    ch.x = s.x + s.charOffset.dx;
    ch.y = s.y + s.charOffset.dy;
  }
}

function pickWanderHome() {
  for (let attempt = 0; attempt < 60; attempt++) {
    const x = 30 + Math.random() * (VW - 60);
    const y = 50 + Math.random() * (VH - 90);
    if (isValidWanderPos(x, y)) return { x, y };
  }
  return { x: 150, y: 60 };
}

function isValidWanderPos(x, y) {
  if (Math.hypot((x - 230) / 34, (y - 240) / 16) < 1.0) return false; // pond
  if (x > 305 && x < 470 && y > 4 && y < 140) return false;            // main house
  if (x > 305 && x < 445 && y > 170 && y < 268) return false;          // cottage
  if (x > 10 && x < 80 && y > 48 && y < 108) return false;             // shed
  if (x > 105 && x < 200 && y > 75 && y < 140) return false;           // top garden
  if (x > 22 && x < 198 && y > 192 && y < 256) return false;           // fenced garden
  if (x < 28 || x > VW - 28) return false;                              // forest sides
  if (y < 42 || y > VH - 32) return false;                              // forest top/bottom
  return true;
}

function saveToStorage() {
  try {
    const data = CHARACTERS.map(ch => ({
      name: ch.name,
      station: ch.station,
      colors: ch.colors,
      activity: ch.activity,
      wanderHome: ch.wanderHome,
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || parsed.length === 0) return null;
    return parsed;
  } catch (e) { return null; }
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({ noRepeatMode }));
  } catch (e) {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (typeof parsed.noRepeatMode === 'boolean') noRepeatMode = parsed.noRepeatMode;
  } catch (e) {}
}
loadSettings();

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const RANDOM_NAMES = ['Лёша','Маша','Никита','Олег','Поля','Рома','Соня','Тима','Уля','Фёдор','Хана','Цой','Чара','Шура','Эмма','Юра','Ярик'];
let wandererCounter = 0;

function createRandomWanderer() {
  wandererCounter++;
  const def = {
    name: rnd(RANDOM_NAMES) + ' ' + wandererCounter,
    station: 'wander',
    activity: rnd(WANDER_ACTIVITIES),
    colors: {
      hair: rnd(RND_COLORS.hair),
      skin: rnd(RND_COLORS.skin),
      shirt: rnd(RND_COLORS.shirt),
      pants: rnd(RND_COLORS.pants),
      shoes: rnd(RND_COLORS.shoes),
    },
  };
  return instantiateChar(def);
}

// =============================================================================
// BACKGROUND — prerendered once
// =============================================================================
const bg = document.createElement('canvas');
bg.width = VW; bg.height = VH;
const bgx = bg.getContext('2d');

function drawBackground() {
  // base grass
  bgx.fillStyle = C.grassMid;
  bgx.fillRect(0, 0, VW, VH);

  // grass texture noise
  for (let i = 0; i < 11000; i++) {
    const x = Math.floor(Math.random() * VW);
    const y = Math.floor(Math.random() * VH);
    const r = Math.random();
    bgx.fillStyle = r < 0.4 ? C.grassDark : r < 0.75 ? C.grassLight : C.grassDot;
    bgx.fillRect(x, y, 1, 1);
  }

  // ===== path (winding, lots of stones) =====
  drawPath();

  // ===== buildings & plots layer =====
  // shed top-left
  drawShed(15, 50);
  // open vegetable garden top-center
  drawGardenPlot(108, 78, 90, 60);
  // big main house top-right
  drawMainHouse(310, 6);
  // cottage bottom-right
  drawCottage(310, 174);
  // fenced garden bottom-left
  drawFencedGarden(28, 198, 165, 55);

  // ===== puddle / small pond =====
  drawPondWater();

  // ===== forest belts =====
  drawForestBelt(-2, 30);          // top
  drawForestBelt(245, 270);         // bottom edge
  drawForestColumn(-4, 30, 100);    // left side
  drawForestColumn(440, 100, 230);  // right side (between buildings - careful)

  // accent big tree
  drawBigTree(232, 24);

  // ===== bushes =====
  const bushes = [
    [222, 134], [98, 152], [200, 145], [240, 152],
    [276, 158], [280, 170], [255, 240], [188, 245],
    [298, 226], [462, 196], [4, 188],
  ];
  for (const [bx, by] of bushes) drawBush(bx, by);

  // ===== mushrooms (in shady forest spots) =====
  const mushroomSpots = [
    [10, 38], [38, 46], [78, 40], [120, 28],
    [220, 30], [410, 28], [462, 50], [4, 220],
    [466, 248], [220, 254], [40, 252], [302, 248],
  ];
  for (const [mx, my] of mushroomSpots) drawMushroom(mx, my);

  // ===== flowers scattered =====
  for (let i = 0; i < 40; i++) {
    const x = 6 + Math.floor(Math.random() * (VW - 12));
    const y = 30 + Math.floor(Math.random() * (VH - 40));
    if (isOnObstruction(x, y)) continue;
    drawFlower(x, y);
  }

  // ===== extra path stones (scattered randomly on grass-path edges) =====
  for (let i = 0; i < 24; i++) {
    const sx = 80 + Math.floor(Math.random() * 320);
    const sy = 140 + Math.floor(Math.random() * 90);
    if (!isOnPath(sx, sy)) continue;
    const r = 1 + Math.floor(Math.random() * 2);
    bgx.fillStyle = C.stoneDark;
    bgx.fillRect(sx, sy, r + 1, r);
    bgx.fillStyle = '#b0a8b0';
    bgx.fillRect(sx, sy, r, r - 1);
  }
}

function drawForestColumn(x, yTop, yBottom) {
  for (let y = yTop; y < yBottom; y += 16 + Math.floor(Math.random() * 6)) {
    drawTreeBlob(x + Math.floor(Math.random() * 6), y);
  }
  for (let i = 0; i < 10; i++) {
    drawTreeBlob(x + Math.floor(Math.random() * 14), yTop + Math.floor(Math.random() * (yBottom - yTop)));
  }
}

function isOnPath(x, y) {
  // main horizontal-ish corridor + winding section
  if (y > 140 && y < 175 && x > 60 && x < 320) return true;
  if (y > 170 && y < 240 && x > 195 && x < 250) return true; // path going down center
  if (y > 235 && y < 260 && x > 200 && x < 320) return true; // bottom approach
  return false;
}
function isOnPond(x, y) {
  return Math.hypot((x - 230) / 30, (y - 240) / 12) < 1.0;
}
function isOnObstruction(x, y) {
  if (isOnPath(x, y) || isOnPond(x, y)) return true;
  // shed
  if (x > 12 && x < 80 && y > 48 && y < 130) return true;
  // main house
  if (x > 305 && x < 465 && y > 4 && y < 138) return true;
  // cottage
  if (x > 305 && x < 445 && y > 170 && y < 268) return true;
  // top garden
  if (x > 105 && x < 200 && y > 75 && y < 140) return true;
  // fenced garden
  if (x > 22 && x < 198 && y > 192 && y < 256) return true;
  return false;
}

function drawPath() {
  // main horizontal corridor connecting shed → garden → houses
  for (let x = 60; x < 320; x++) {
    const cy = 155 + Math.sin(x * 0.03) * 4;
    for (let dy = -12; dy <= 12; dy++) {
      const y = Math.floor(cy + dy);
      const edge = Math.abs(dy) > 10;
      bgx.fillStyle = edge ? C.pathDark : (Math.random() < 0.3 ? C.pathLight : C.path);
      bgx.fillRect(x, y, 1, 1);
    }
  }
  // vertical section going down toward cottage / fenced garden
  for (let y = 165; y < 245; y++) {
    const cx = 220 + Math.sin(y * 0.05) * 6;
    for (let dx = -10; dx <= 10; dx++) {
      const x = Math.floor(cx + dx);
      const edge = Math.abs(dx) > 8;
      bgx.fillStyle = edge ? C.pathDark : (Math.random() < 0.3 ? C.pathLight : C.path);
      bgx.fillRect(x, y, 1, 1);
    }
  }
  // bottom-right approach to cottage
  for (let x = 215; x < 310; x++) {
    const cy = 246 + Math.sin(x * 0.06) * 3;
    for (let dy = -8; dy <= 8; dy++) {
      const y = Math.floor(cy + dy);
      const edge = Math.abs(dy) > 6;
      bgx.fillStyle = edge ? C.pathDark : (Math.random() < 0.3 ? C.pathLight : C.path);
      bgx.fillRect(x, y, 1, 1);
    }
  }
  // stones — generous scatter
  for (let i = 0; i < 60; i++) {
    const where = Math.random();
    let x, y;
    if (where < 0.55) { // main corridor
      x = 60 + Math.random() * 260;
      y = 148 + Math.random() * 14;
    } else if (where < 0.85) { // vertical
      x = 210 + Math.random() * 22;
      y = 165 + Math.random() * 80;
    } else { // bottom
      x = 215 + Math.random() * 95;
      y = 242 + Math.random() * 8;
    }
    const sz = Math.random() < 0.3 ? 3 : 2;
    bgx.fillStyle = C.stoneDark;
    bgx.fillRect(Math.floor(x), Math.floor(y), sz, sz - 1);
    bgx.fillStyle = '#b0a8b0';
    bgx.fillRect(Math.floor(x), Math.floor(y), sz - 1, sz - 2);
  }
  // small grass tufts at path edges
  for (let i = 0; i < 22; i++) {
    const x = 60 + Math.random() * 260;
    const y = Math.random() < 0.5 ? 144 + Math.random() * 2 : 167 + Math.random() * 2;
    bgx.fillStyle = C.grassDark;
    bgx.fillRect(Math.floor(x), Math.floor(y), 2, 1);
  }
}

function drawPondWater() {
  // small puddle around (230, 240), rx=30, ry=12
  for (let y = 226; y <= 254; y++) {
    for (let x = 198; x <= 262; x++) {
      const d = Math.hypot((x - 230) / 30, (y - 240) / 12);
      if (d < 1.0) {
        const edge = d > 0.82;
        const r = Math.random();
        bgx.fillStyle = edge ? C.waterDark : (r < 0.06 ? C.waterHL : r < 0.20 ? C.waterLight : C.water);
        bgx.fillRect(x, y, 1, 1);
      }
    }
  }
  // muddy/rocky bank
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const rx = 30 + Math.random() * 3;
    const ry = 12 + Math.random() * 2;
    const px = Math.floor(230 + Math.cos(a) * rx);
    const py = Math.floor(240 + Math.sin(a) * ry);
    bgx.fillStyle = C.dirtDark;
    bgx.fillRect(px, py, 2, 1);
  }
  // a tiny lily pad
  bgx.fillStyle = C.leavesL;
  bgx.fillRect(244, 238, 4, 2); bgx.fillRect(245, 237, 2, 1);
}

function drawBigTree(x, y) {
  // trunk
  bgx.fillStyle = C.trunkD;
  bgx.fillRect(x + 12, y + 36, 8, 28);
  bgx.fillStyle = C.trunk;
  bgx.fillRect(x + 13, y + 36, 6, 28);
  // leaves — multi-layer blob
  const blobs = [
    [x, y, 32, 22, C.leavesD],
    [x + 2, y + 2, 28, 18, C.leaves],
    [x + 4, y, 24, 16, C.leavesL],
    [x + 16, y - 4, 16, 14, C.leaves],
    [x - 4, y + 6, 16, 16, C.leaves],
    [x + 22, y + 14, 14, 14, C.leavesD],
  ];
  for (const [bx, by, bw, bh, col] of blobs) {
    bgx.fillStyle = col;
    drawEllipse(bgx, bx + bw / 2, by + bh / 2, bw / 2, bh / 2);
  }
  // highlight specks
  bgx.fillStyle = C.grassLight;
  for (let i = 0; i < 14; i++) {
    bgx.fillRect(x + 4 + Math.floor(Math.random() * 24), y + 2 + Math.floor(Math.random() * 14), 1, 1);
  }
}

function drawSmallTree(x, y) {
  bgx.fillStyle = C.trunkD;
  bgx.fillRect(x + 6, y + 18, 4, 12);

  bgx.fillStyle = C.leaves;

  drawEllipse(bgx, x + 10, y + 8, 5, 5);

function drawBush(x, y) {
  bgx.fillStyle = C.leavesD;
  drawEllipse(bgx, x + 6, y + 4, 8, 4);
  bgx.fillStyle = C.leaves;
  drawEllipse(bgx, x + 6, y + 3, 7, 3);

function drawFlower(x, y) {
  const colors = [C.flower1, C.flower2, C.flower3, C.flowerW];
  const c = colors[Math.floor(Math.random() * colors.length)];
  bgx.fillStyle = C.leaves; bgx.fillRect(x + 1, y + 2, 1, 1);
  bgx.fillStyle = c;
  bgx.fillRect(x, y, 1, 1);
  bgx.fillRect(x + 2, y, 1, 1);
  bgx.fillRect(x + 1, y + 1, 1, 1);
  bgx.fillRect(x, y + 2, 1, 1);
  bgx.fillRect(x + 2, y + 2, 1, 1);
  bgx.fillStyle = C.flowerW === c ? C.flower2 : C.flowerW;
  bgx.fillRect(x + 1, y + 1, 1, 1);
}

function drawTileRoof(x, y, w, h) {
  // base shadow
  bgx.fillStyle = C.roofTileShade;
  bgx.fillRect(x, y, w, h);
  // horizontal tile bands
  for (let row = 0; row < h; row += 3) {
    const cy = y + row;
    bgx.fillStyle = C.roofTile;
    bgx.fillRect(x, cy, w, 2);
    bgx.fillStyle = C.roofTileLight;
    bgx.fillRect(x, cy, w, 1);
  }
  // staggered vertical tile separators
  for (let row = 0; row < h; row += 3) {
    const offset = ((row / 3) | 0) % 2 === 0 ? 0 : 3;
    for (let col = -offset; col < w; col += 6) {
      bgx.fillStyle = C.roofTileShade;
      bgx.fillRect(x + col, y + row, 1, 2);
    }
  }
}

function drawSlopedTileRoof(x, y, w, h) {
  // pyramid-shaped roof: each row narrower toward top
  for (let i = 0; i < h; i++) {
    const inset = Math.floor(i * (w / 2 / h));
    const yy = y + (h - 1 - i);
    const xx = x + inset;
    const ww = w - inset * 2;
    if (ww <= 0) continue;
    const tileBand = i % 3;
    if (tileBand === 0) {
      bgx.fillStyle = C.roofTileLight;
    } else if (tileBand === 1) {
      bgx.fillStyle = C.roofTile;
    } else {
      bgx.fillStyle = C.roofTileShade;
    }
    bgx.fillRect(xx, yy, ww, 1);
  }
  // edge dark line on sides
  for (let i = 0; i < h; i++) {
    const inset = Math.floor(i * (w / 2 / h));
    const yy = y + (h - 1 - i);
    bgx.fillStyle = C.roofTileShade;
    bgx.fillRect(x + inset, yy, 1, 1);
    bgx.fillRect(x + w - inset - 1, yy, 1, 1);
  }
  // overhang
  bgx.fillStyle = C.roofTileShade;
  bgx.fillRect(x - 3, y + h - 2, w + 6, 3);
  bgx.fillStyle = C.roofTileDark;
  bgx.fillRect(x - 3, y + h - 4, w + 6, 2);
}

function drawEllipse(c, cx, cy, rx, ry) {
  for (let y = -ry; y <= ry; y++) {
    for (let x = -rx; x <= rx; x++) {
      if ((x * x) / (rx * rx) + (y * y) / (ry * ry) <= 1) {
        c.fillRect(Math.floor(cx + x), Math.floor(cy + y), 1, 1);
      }
    }
  }
}

function drawKitchen(g, s, t) {
  const x = s.x, y = s.y;
  const ch = CHARACTERS.find(c => c.station === 'kitchen' && !c.hidden && c.routine);
  const action = ch ? ch.routine.action : 'stir';
  const elapsed = ch ? (performance.now() - ch.routine.start) / 1000 : 0;
  const phase = ch ? Math.min(1, elapsed / ch.routine.duration) : 0;

  // stones for the firepit
  g.fillStyle = C.stoneDark;
  drawEllipseOn(g, x, y + 14, 14, 4);
  g.fillStyle = C.stone;
  drawEllipseOn(g, x, y + 13, 13, 3);
  // fire (extra intense during 'blow')
  drawFire(g, x, y + 6, t);
  if (action === 'blow') {
    // extra flames
    g.fillStyle = C.fireYellow;
    for (let i = 0; i < 6; i++) {
      const fx = x - 4 + Math.floor(Math.random() * 9);
      const fy = y - Math.floor(Math.random() * 4);
      g.fillRect(fx, fy, 1, 1);
    }
    g.fillStyle = C.fireOrange;
    drawEllipseOn(g, x, y - 1, 4, 4);
    // blow puff lines from the left (char's mouth)
    g.globalAlpha = 0.7;
    for (let i = 0; i < 3; i++) {
      const px = x - 14 + i * 3;
      const py = y + 4 + Math.sin(elapsed * 8 + i) * 1;
      g.fillStyle = '#ffffff';
      g.fillRect(Math.floor(px), Math.floor(py), 2, 1);
    }
    g.globalAlpha = 1;
  }
  // tripod legs
  g.fillStyle = C.stoneDark;
  g.fillRect(x - 6, y + 2, 1, 12);
  g.fillRect(x + 5, y + 2, 1, 12);
  // pot
  g.fillStyle = '#202020';
  g.fillRect(x - 7, y - 2, 14, 7);
  g.fillStyle = '#404040';
  g.fillRect(x - 7, y - 2, 14, 1);
  g.fillRect(x - 6, y - 1, 12, 1);
  g.fillStyle = '#101010';
  g.fillRect(x - 6, y, 12, 4);
  // handles
  g.fillStyle = '#202020';
  g.fillRect(x - 9, y - 1, 2, 1); g.fillRect(x - 9, y, 1, 1);
  g.fillRect(x + 7, y - 1, 2, 1); g.fillRect(x + 8, y, 1, 1);

  // ---- action-specific overlays ----
  if (action === 'stir') {
    // spoon making circular stir motion in pot
    const angle = elapsed * 5;
    const sx = x + Math.cos(angle) * 3;
    const sy = y - 1 + Math.sin(angle) * 1.2;
    // handle going up-left to char's hand
    drawLine(g, sx, sy, sx - 5, sy - 9, C.woodLight);
    g.fillStyle = C.woodLight;
    g.fillRect(Math.floor(sx) - 6, Math.floor(sy) - 10, 2, 2);
    // bubbles/splash
    if (Math.sin(angle * 2) > 0.7) {
      g.fillStyle = '#806038';
      g.fillRect(x - 2, y - 3, 1, 1);
      g.fillRect(x + 2, y - 3, 1, 1);
    }
  } else if (action === 'add') {
    // ingredient arcs from char's hand into pot
    const charX = ch ? ch.x + 4 : x - 22;
    const charY = ch ? ch.y + 4 : y - 8;
    const ax = charX + (x - charX) * phase;
    const ay = charY + (y - 2 - charY) * phase - Math.sin(phase * Math.PI) * 14;
    g.fillStyle = ch ? ch.routine.ingredient : '#e08030';
    g.fillRect(Math.floor(ax), Math.floor(ay), 3, 3);
    g.fillStyle = '#000';
    g.fillRect(Math.floor(ax) + 1, Math.floor(ay) + 1, 1, 1);
    // splash when ingredient lands
    if (phase > 0.92) {
      g.fillStyle = '#806038';
      g.fillRect(x - 2, y - 4, 1, 1);
      g.fillRect(x + 2, y - 4, 1, 1);
      g.fillStyle = ch ? ch.routine.ingredient : '#e08030';
      g.fillRect(x, y - 5, 1, 1);
    }
  } else if (action === 'taste') {
    // spoon rising from pot to char's mouth (to the left)
    const sx = x - 12 + (1 - phase) * 10;
    const sy = y - 5 - phase * 4;
    drawLine(g, x - 4, y, sx, sy, C.woodLight);
    g.fillStyle = C.woodLight;
    g.fillRect(Math.floor(sx) - 1, Math.floor(sy) - 1, 3, 2);
    g.fillStyle = '#806038';
    g.fillRect(Math.floor(sx), Math.floor(sy) - 1, 1, 1);
    // little tasting "!" or steam
    if (phase > 0.7) {
      g.fillStyle = '#ffd040';
      g.fillRect(Math.floor(sx) - 4, Math.floor(sy) - 4, 1, 2);
      g.fillRect(Math.floor(sx) - 4, Math.floor(sy) - 1, 1, 1);
    }
  }
  // steam (extra during 'add' when splash, less during 'blow')
  const steamCount = action === 'blow' ? 2 : action === 'add' ? 6 : 4;
  drawSteam(g, x - 2, y - 4, t, steamCount);
}

function drawBakery(g, s, t) {
  const x = s.x, y = s.y;
  // brick oven body
  g.fillStyle = C.brickD;
  g.fillRect(x - 10, y - 4, 22, 18);
  g.fillStyle = C.brick;
  g.fillRect(x - 9, y - 3, 20, 16);
  // brick lines
  g.fillStyle = C.brickD;
  for (let row = 0; row < 4; row++) {
    g.fillRect(x - 9, y - 3 + row * 4, 20, 1);
    const offset = row % 2 === 0 ? 0 : 4;
    for (let bx = x - 9 + offset; bx < x + 11; bx += 8) {
      g.fillRect(bx, y - 3 + row * 4, 1, 4);
    }
  }
  // dome top
  g.fillStyle = C.brickD;
  drawEllipseOn(g, x + 1, y - 5, 11, 5);
  g.fillStyle = C.brick;
  drawEllipseOn(g, x + 1, y - 4, 10, 4);
  // chimney
  g.fillStyle = C.brickD;
  g.fillRect(x + 6, y - 14, 4, 8);
  g.fillStyle = C.brick;
  g.fillRect(x + 7, y - 13, 2, 8);
  // oven mouth
  g.fillStyle = '#101010';
  drawEllipseOn(g, x + 1, y + 4, 6, 4);
  g.fillStyle = C.fireRed;
  drawEllipseOn(g, x + 1, y + 5, 4, 2);
  g.fillStyle = C.fireOrange;
  drawEllipseOn(g, x + 1, y + 5, 2, 1);
  // smoke from chimney
  drawSteam(g, x + 7, y - 16, t, 5);
}

function drawGarden(g, s, t) {
  const x = s.x, y = s.y;
  const ch = CHARACTERS.find(c => c.station === 'garden' && !c.hidden && c.routine);
  const action = ch ? ch.routine.action : 'rest';
  const elapsed = ch ? (performance.now() - ch.routine.start) / 1000 : 0;

  // sparkle/bug
  if (Math.sin(t * 2) > 0.6) {
    g.fillStyle = C.fireYellow;
    g.fillRect(x + 8 + Math.floor(Math.sin(t * 3) * 4), y - 8, 1, 1);
  }

  if (action === 'hoe') {
    // swinging hoe — angle oscillates between high and low strike
    const swing = Math.sin(elapsed * 6) * 0.6 - 0.4;
    const px = x - 4, py = y - 8;
    const len = 14;
    const ex = px + Math.cos(swing) * len;
    const ey = py + Math.sin(swing) * len;
    drawLine(g, px, py, ex, ey, C.woodDark);
    // metal blade
    g.fillStyle = '#808088';
    g.fillRect(Math.floor(ex - 1), Math.floor(ey), 3, 2);
    g.fillStyle = '#a0a0a8';
    g.fillRect(Math.floor(ex - 1), Math.floor(ey), 3, 1);
    // dirt puffs when hoe strikes ground
    if (Math.sin(elapsed * 6) > 0.85) {
      g.fillStyle = C.dirtDark;
      g.fillRect(Math.floor(ex), Math.floor(ey) + 2, 1, 1);
      g.fillRect(Math.floor(ex) + 2, Math.floor(ey) + 2, 1, 1);
    }
  } else if (action === 'water') {
    // watering can in hand + dripping water
    const cx = x - 6, cy = y - 12;
    g.fillStyle = '#404850';
    g.fillRect(cx, cy, 9, 6);
    g.fillStyle = '#606870';
    g.fillRect(cx, cy, 9, 1);
    g.fillRect(cx, cy + 1, 1, 4);
    // spout
    g.fillStyle = '#606870';
    g.fillRect(cx + 9, cy + 2, 3, 2);
    g.fillStyle = '#404850';
    g.fillRect(cx + 9, cy + 4, 3, 1);
    // handle
    g.fillStyle = '#606870';
    g.fillRect(cx + 3, cy - 2, 4, 1);
    g.fillRect(cx + 3, cy - 1, 1, 1);
    g.fillRect(cx + 6, cy - 1, 1, 1);
    // water stream
    for (let i = 0; i < 6; i++) {
      const dropPhase = (elapsed * 4 + i * 0.18) % 1;
      const dx = cx + 13;
      const dy = cy + 4 + dropPhase * 16;
      g.fillStyle = '#5098d8';
      g.fillRect(dx, Math.floor(dy), 1, 1);
      if (dropPhase > 0.85) {
        g.fillStyle = '#a0d0f0';
        g.fillRect(dx - 1, Math.floor(dy) + 1, 1, 1);
        g.fillRect(dx + 1, Math.floor(dy) + 1, 1, 1);
        g.fillRect(dx, Math.floor(dy) + 2, 1, 1);
      }
    }
  } else if (action === 'plant') {
    // tiny seedling appearing in front
    g.fillStyle = C.dirtDark;
    g.fillRect(x + 4, y + 6, 5, 2);
    g.fillStyle = C.cropDark;
    g.fillRect(x + 6, y + 4, 1, 2);
    g.fillStyle = C.crop;
    g.fillRect(x + 6, y + 3, 1, 1);
    // little hand motion line
    g.fillStyle = C.dirtDark;
    g.fillRect(x + 3 + Math.floor(Math.sin(elapsed * 5) * 1), y + 7, 1, 1);
  } else {
    // rest — hoe leaning beside her, wipes brow
    g.fillStyle = C.woodDark;
    g.fillRect(x + 14, y - 22, 1, 22);
    g.fillStyle = '#808088';
    g.fillRect(x + 12, y - 22, 4, 2);
    // sweat drop
    if (Math.sin(elapsed * 4) > 0.5) {
      g.fillStyle = '#80c0e0';
      g.fillRect(x - 6, y - 14 + Math.floor(Math.sin(elapsed * 4) * 2), 1, 2);
    }
  }
}

function drawWoodpile(g, s, t) {
  const x = s.x, y = s.y;
  // tree stump
  g.fillStyle = C.trunkD;
  drawEllipseOn(g, x + 4, y + 10, 10, 4);
  g.fillStyle = C.trunk;
  drawEllipseOn(g, x + 4, y + 8, 9, 3);
  g.fillStyle = '#7a4818';
  drawEllipseOn(g, x + 4, y + 4, 9, 5);
  g.fillStyle = C.trunk;
  drawEllipseOn(g, x + 4, y + 4, 7, 4);
  g.fillStyle = C.woodLight;
  drawEllipseOn(g, x + 4, y + 4, 5, 3);
  g.fillStyle = C.trunkD;
  for (let i = 1; i < 4; i++) {
    drawRing(g, x + 4, y + 4, i * 1.6, 1.0);
  }
  // logs pile
  g.fillStyle = C.trunkD;
  g.fillRect(x + 16, y + 6, 18, 4);
  g.fillRect(x + 18, y + 2, 14, 4);
  g.fillStyle = C.trunk;
  g.fillRect(x + 17, y + 7, 16, 2);
  g.fillRect(x + 19, y + 3, 12, 2);
  g.fillStyle = C.woodLight;
  for (let i = 0; i < 3; i++) {
    g.fillRect(x + 16 + i * 6, y + 6, 2, 4);
    g.fillRect(x + 18 + i * 5, y + 2, 2, 4);
  }
  // axe — swings with action phase
  const swing = Math.sin(t * 4) * 0.5 - 0.7; // angle
  const ax = x - 8, ay = y - 4;
  drawAxe(g, ax, ay, swing);
}

function drawAxe(g, px, py, angle) {
  // handle
  const len = 14;
  const ex = px + Math.cos(angle) * len;
  const ey = py + Math.sin(angle) * len;
  drawLine(g, px, py, ex, ey, C.woodDark);
  // head
  g.fillStyle = '#a0a0b0';
  g.fillRect(Math.floor(ex - 1), Math.floor(ey - 2), 4, 4);
  g.fillStyle = '#d0d0e0';
  g.fillRect(Math.floor(ex), Math.floor(ey - 2), 2, 4);
  g.fillStyle = C.woodDark;
  g.fillRect(Math.floor(ex - 1), Math.floor(ey - 1), 1, 2);
}

function drawLine(g, x1, y1, x2, y2, color) {
  g.fillStyle = color;
  const dx = x2 - x1, dy = y2 - y1;
  const steps = Math.max(Math.abs(dx), Math.abs(dy));
  for (let i = 0; i <= steps; i++) {
    const x = Math.round(x1 + dx * (i / steps));
    const y = Math.round(y1 + dy * (i / steps));
    g.fillRect(x, y, 1, 1);
  }
}

function drawEasel(g, s, t) {
  const x = s.x, y = s.y;
  // legs (tripod)
  g.fillStyle = C.woodDark;
  drawLine(g, x - 4, y + 18, x - 2, y - 14, C.woodDark);
  drawLine(g, x + 4, y + 18, x + 2, y - 14, C.woodDark);
  drawLine(g, x, y + 18, x, y - 6, C.woodDark);
  // canvas frame
  g.fillStyle = C.woodLight;
  g.fillRect(x - 12, y - 14, 22, 18);
  // canvas
  g.fillStyle = '#f0e8d0';
  g.fillRect(x - 10, y - 12, 18, 14);
  // painting — random colorful strokes
  const strokes = [
    [C.water, x - 8, y - 10, 14, 3],
    [C.leaves, x - 8, y - 4, 7, 5],
    [C.leavesL, x, y - 5, 6, 4],
    [C.fireYellow, x - 5, y - 7, 3, 2],
    [C.flower1, x + 2, y - 7, 2, 2],
  ];
  for (const [col, sx, sy, sw, sh] of strokes) {
    g.fillStyle = col;
    g.fillRect(sx, sy, sw, sh);
  }
  // paint pulse — small new stroke appearing
  const ph = Math.floor((t * 0.8) % 4);
  g.fillStyle = [C.flower1, C.flower2, C.water, C.fireYellow][ph];
  g.fillRect(x - 3 + ph * 2, y - 1, 2, 1);
}

function drawPond(g, s, t) {
  const x = s.x, y = s.y;
  const POND_X = 230, POND_Y = 240;
  // ripples in pond — animated
  const r = (t * 1.2) % 1;
  g.fillStyle = C.waterHL;
  drawRing(g, POND_X, POND_Y, 5 + r * 6, 1);
  g.globalAlpha = 1 - r;
  drawRing(g, POND_X, POND_Y, 9 + r * 4, 1);
  g.globalAlpha = 1;
  // fishing rod from char position
  const rodAngle = 0.4 + Math.sin(t * 0.5) * 0.05; // pointing down-right toward water
  const rx = x + 4, ry = y;
  const tipX = rx + Math.cos(rodAngle) * 18;
  const tipY = ry + Math.sin(rodAngle) * 18;
  drawLine(g, rx, ry, tipX, tipY, C.woodDark);
  // line down to water
  drawLine(g, tipX, tipY, POND_X, POND_Y, '#ffffff');
  // float bobbing
  const bob = Math.sin(t * 3) * 0.5;
  g.fillStyle = C.fireRed;
  g.fillRect(POND_X, POND_Y - 1 + bob, 1, 1);
  g.fillStyle = C.flowerW;
  g.fillRect(POND_X, POND_Y + bob, 1, 1);
  // occasional fish jump
  const j = (t * 0.4) % 6;
  if (j < 0.8) {
    const fy = Math.sin(j / 0.8 * Math.PI) * 6;
    g.fillStyle = '#a08040';
    g.fillRect(POND_X + 12, POND_Y - fy, 3, 2);
    g.fillStyle = '#604018';
    g.fillRect(POND_X + 14, POND_Y - fy, 1, 1);
  }
}

function drawBench(g, s, t) {
  const x = s.x, y = s.y;
  // seat
  g.fillStyle = C.woodDark;
  g.fillRect(x - 14, y, 30, 4);
  g.fillStyle = C.wood;
  g.fillRect(x - 14, y + 1, 30, 2);
  g.fillStyle = C.woodLight;
  g.fillRect(x - 14, y + 1, 30, 1);
  // legs
  g.fillStyle = C.woodDark;
  g.fillRect(x - 12, y + 4, 2, 6);
  g.fillRect(x + 12, y + 4, 2, 6);
  // back rest
  g.fillStyle = C.woodDark;
  g.fillRect(x - 13, y - 8, 28, 2);
  g.fillRect(x - 12, y - 6, 1, 6);
  g.fillRect(x + 13, y - 6, 1, 6);
  // book in reader's hands (drawn separate, here a tiny floating "Z" symbol when calm)
  if (Math.sin(t * 0.6) > 0.3) {
    g.fillStyle = '#ffffff';
    // tiny music/thought note
    g.fillRect(x + 12, y - 16 + Math.sin(t) * 1, 1, 1);
  }
}

function drawCampfire(g, s, t) {
  const x = s.x, y = s.y;
  // log circle
  g.fillStyle = C.trunkD;
  drawEllipseOn(g, x, y + 6, 12, 4);
  g.fillStyle = C.trunk;
  g.fillRect(x - 8, y + 4, 16, 3);
  g.fillStyle = C.woodLight;
  g.fillRect(x - 7, y + 4, 1, 3);
  g.fillRect(x + 6, y + 4, 1, 3);
  // fire
  drawFire(g, x, y, t);
  // music notes from musician (drawn by char's side)
  const note = Math.sin(t * 0.7);
  if (note > 0) {
    g.fillStyle = '#ffffff';
    g.font = '8px monospace';
    g.fillText('♪', x + 24, y - 6 - note * 6);
    g.font = '6px monospace';
    g.fillText('♫', x + 28, y - 12 - note * 8);
  }
}

function drawFire(g, cx, cy, t) {
  // base
  g.fillStyle = C.fireRed;
  drawEllipseOn(g, cx, cy + 4, 6, 2);
  // flames — flickering
  const f1 = Math.sin(t * 6) * 0.5 + 0.5;
  const f2 = Math.sin(t * 8 + 1) * 0.5 + 0.5;
  g.fillStyle = C.fireOrange;
  drawEllipseOn(g, cx - 2, cy + 1, 3, 3 + Math.floor(f1));
  drawEllipseOn(g, cx + 2, cy + 1, 3, 3 + Math.floor(f2));
  drawEllipseOn(g, cx, cy - 1, 3, 4 + Math.floor(f1));
  g.fillStyle = C.fireYellow;
  drawEllipseOn(g, cx, cy + 1, 2, 3);
  drawEllipseOn(g, cx - 1, cy - 1, 1, 2);
  // sparks
  if (Math.random() < 0.15) {
    g.fillStyle = C.fireYellow;
    g.fillRect(cx + Math.floor(Math.random() * 6 - 3), cy - 4 - Math.floor(Math.random() * 4), 1, 1);
  }
}

function drawSteam(g, x, y, t, count) {
  for (let i = 0; i < count; i++) {
    const phase = (t * 0.6 + i / count) % 1;
    const sy = y - phase * 18;
    const sx = x + Math.sin(t * 2 + i) * 2;
    const a = (1 - phase) * 0.8;
    g.globalAlpha = a;
    g.fillStyle = C.smoke;
    g.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
    g.fillRect(Math.floor(sx + 1), Math.floor(sy - 1), 1, 1);
  }
  g.globalAlpha = 1;
}

function drawEllipseOn(c, cx, cy, rx, ry) {
  for (let y = -ry; y <= ry; y++) {
    for (let x = -rx; x <= rx; x++) {
      if ((x * x) / (rx * rx) + (y * y) / (ry * ry) <= 1) {
        c.fillRect(Math.floor(cx + x), Math.floor(cy + y), 1, 1);
      }
    }
  }
}

function drawRing(c, cx, cy, r, thick) {
  for (let y = -r - thick; y <= r + thick; y++) {
    for (let x = -r - thick; x <= r + thick; x++) {
      const d = Math.hypot(x, y);
      if (d >= r && d <= r + thick) {
        c.fillRect(Math.floor(cx + x), Math.floor(cy + y), 1, 1);
      }
    }
  }
}

// =============================================================================
// CHARACTER DRAWING + AMBIENT (birds, butterflies)
// =============================================================================
function drawCharacter(g, ch, t) {
  const isMoving = ch.walking || ch.leaving;
  const bob = isMoving ? 0 : Math.sin(t * 2 + ch.bobPhase) * 0.6;
  let sprite;
  if (isMoving) {
    sprite = (Math.floor(ch.walkPhase) % 2) ? ch.sprite.walk : ch.sprite.idle;
  } else {
    sprite = ch.sprite.idle;
  }
  const prevAlpha = g.globalAlpha;
  g.globalAlpha = prevAlpha * (ch.alpha ?? 1);
  // tiny shadow under feet
  g.fillStyle = C.shadow;
  drawEllipseOn(g, ch.x + 7, ch.y + 22, 5, 1.6);
  g.drawImage(sprite, Math.floor(ch.x), Math.floor(ch.y - bob));

  // selection ring (not when leaving)
  if (selectedChar === ch && state !== 'overview' && !ch.leaving) {
    const pulse = (Math.sin(t * 5) + 1) / 2;
    g.fillStyle = `rgba(255, 208, 64, ${0.5 + pulse * 0.4})`;
    drawRing(g, ch.x + 7, ch.y + 23, 9, 1);
  }

  // name label above head — always visible (unless leaving — too noisy)
  if (!ch.leaving) drawNameLabel(g, ch, t);
  g.globalAlpha = prevAlpha;
}

function drawNameLabel(g, ch, t) {
  const isSelected = selectedChar === ch && state !== 'overview';
  g.font = '6px "Press Start 2P", ui-monospace, monospace';
  g.textAlign = 'center';
  g.textBaseline = 'alphabetic';
  const label = ch.name;
  const lw = Math.ceil(g.measureText(label).width) + 4;
  const lx = ch.x + 7;
  const ly = ch.y - 2;
  // background pill
  g.fillStyle = isSelected ? 'rgba(40, 30, 10, 0.95)' : 'rgba(20, 20, 30, 0.78)';
  g.fillRect(lx - lw / 2, ly - 7, lw, 8);
  // text
  g.fillStyle = isSelected ? '#ffd040' : '#ffffff';
  g.fillText(label, lx, ly - 1);
  g.textAlign = 'start';
}

// Ambient: butterflies
const butterflies = [
  { x: 100, y: 80, vx: 0.3, vy: 0.1, color: '#ffd040' },
  { x: 300, y: 60, vx: -0.2, vy: 0.15, color: '#e060c0' },
  { x: 200, y: 200, vx: 0.25, vy: -0.1, color: '#ffffff' },
];

function updateButterfly(b) {
  b.x += b.vx + Math.sin(performance.now() / 500 + b.x) * 0.2;
  b.y += b.vy + Math.cos(performance.now() / 400 + b.y) * 0.2;
  if (b.x < 20 || b.x > VW - 20) b.vx *= -1;
  if (b.y < 30 || b.y > VH - 30) b.vy *= -1;
}

function drawButterfly(g, b, t) {
  const flap = Math.floor(t * 12) % 2;
  g.fillStyle = b.color;
  if (flap) {
    g.fillRect(b.x - 2, b.y, 1, 1);
    g.fillRect(b.x + 2, b.y, 1, 1);
    g.fillRect(b.x - 1, b.y - 1, 1, 1);
    g.fillRect(b.x + 1, b.y - 1, 1, 1);
  } else {
    g.fillRect(b.x - 1, b.y - 1, 1, 2);
    g.fillRect(b.x + 1, b.y - 1, 1, 2);
  }
  g.fillStyle = '#000';
  g.fillRect(b.x, b.y, 1, 1);
}

// Per-type sprites with palette swap + small pattern overlays
const CAT_TYPES = {
  orange: { H:'#d88040', s:'#a05818', i:'#f0a890', e:'#2a1a08', m:'#3a2010', P:'#d88040', T:'#a05818' },
  white:  { H:'#f0f0e8', s:'#d09060', i:'#f0c8b0', e:'#2a1a08', m:'#d04040', P:'#f0f0e8', T:'#d09060' },
  gray:   { H:'#a0a0b0', s:'#f0f0e8', i:'#c0a0a0', e:'#4080c0', m:'#a04040', P:'#a0a0b0', T:'#a0a0b0' },
  black:  { H:'#28282a', s:'#14141a', i:'#604040', e:'#ffd040', m:'#603020', P:'#28282a', T:'#28282a' },
};

function makeCatSprite(frame, type) {
  const palette = { ...CAT_TYPES[type], '.': null };
  return makeSprite(frame, palette);
}

const CATS = [
  { type: 'orange', home: { x: 218, y: 218 } },
  { type: 'white',  home: { x: 270, y: 218 } },
  { type: 'gray',   home: { x: 282, y: 252 } },
  { type: 'black',  home: { x: 208, y: 256 } },
];

for (const cat of CATS) {
  cat.idle  = makeCatSprite(CAT_IDLE, cat.type);
  cat.walk0 = makeCatSprite(CAT_WALK_0, cat.type);
  cat.walk1 = makeCatSprite(CAT_WALK_1, cat.type);
  cat.x = cat.home.x;
  cat.y = cat.home.y;
  cat.target = null;
  cat.walking = false;
  cat.walkPhase = Math.random() * 10;
  cat.idleUntil = performance.now() + Math.random() * 2000;
  cat.facing = Math.random() < 0.5 ? -1 : 1;
}

function isValidCatPos(x, y) {
  if (Math.hypot((x - 230) / 32, (y - 240) / 14) < 1.0) return false; // pond
  if (x < 195 || x > 304) return false;                  // stay between fenced garden + cottage
  if (y < 200 || y > 262) return false;
  return true;
}

function updateCat(cat, dt, now) {
  if (cat.target) {
    const dx = cat.target.x - cat.x;
    const dy = cat.target.y - cat.y;
    const d = Math.hypot(dx, dy);
    if (d < 1.5) {
      cat.target = null;
      cat.walking = false;
      cat.idleUntil = now + 1500 + Math.random() * 4000;
    } else {
      const speed = 14 + Math.random() * 4;
      cat.x += (dx / d) * speed * dt;
      cat.y += (dy / d) * speed * dt;
      if (Math.abs(dx) > 0.3) cat.facing = dx >= 0 ? 1 : -1;
      cat.walking = true;
      cat.walkPhase += dt * 5;
    }
  } else {
    cat.walking = false;
    if (now >= cat.idleUntil) {
      for (let attempt = 0; attempt < 14; attempt++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 14 + Math.random() * 40;
        const tx = cat.home.x + Math.cos(angle) * dist;
        const ty = cat.home.y + Math.sin(angle) * dist * 0.55;
        if (isValidCatPos(tx, ty)) {
          cat.target = { x: tx, y: ty };
          break;
        }
      }
      cat.idleUntil = now + 999999;
    }
  }
}

function drawCat(g, cat, t) {
  let sprite;
  if (cat.walking) {
    sprite = (Math.floor(cat.walkPhase) % 2) ? cat.walk1 : cat.walk0;
  } else {
    sprite = cat.idle;
  }
  // shadow
  g.fillStyle = C.shadow;
  drawEllipseOn(g, cat.x + 5, cat.y + 10, 4, 1.2);
  if (cat.facing < 0) {
    g.save();
    g.translate(Math.floor(cat.x) + sprite.width, Math.floor(cat.y));
    g.scale(-1, 1);
    g.drawImage(sprite, 0, 0);
    g.restore();
  } else {
    g.drawImage(sprite, Math.floor(cat.x), Math.floor(cat.y));
  }
}

// =============================================================================
// WANDERER UPDATE — for new characters with station 'wander'
// =============================================================================
function updateWanderer(ch, dt, now) {
  // freeze movement when selected so the camera & name stay put
  if (selectedChar === ch && state !== 'overview') {
    ch.walking = false;
    return;
  }
  if (ch.wanderTarget) {
    const dx = ch.wanderTarget.x - ch.x;
    const dy = ch.wanderTarget.y - ch.y;
    const d = Math.hypot(dx, dy);
    if (d < 1.5) {
      ch.wanderTarget = null;
      ch.walking = false;
      ch.idleUntil = now + 1500 + Math.random() * 4500;
    } else {
      const speed = 16;
      ch.x += (dx / d) * speed * dt;
      ch.y += (dy / d) * speed * dt;
      ch.walking = true;
      ch.walkPhase += dt * 4;
    }
  } else {
    ch.walking = false;
    if (now >= ch.idleUntil) {
      for (let attempt = 0; attempt < 12; attempt++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 22 + Math.random() * 55;
        const tx = ch.wanderHome.x + Math.cos(angle) * dist;
        const ty = ch.wanderHome.y + Math.sin(angle) * dist * 0.6;
        if (isValidWanderPos(tx, ty)) {
          ch.wanderTarget = { x: tx, y: ty };
          break;
        }
      }
      ch.idleUntil = now + 999999;
    }
  }
}

// =============================================================================
// CAMERA + STATE
// =============================================================================
const camera = {
  x: VW / 2, y: VH / 2, zoom: 1,
  tx: VW / 2, ty: VH / 2, tz: 1,
};

let state = 'overview'; // 'overview' | 'zooming' | 'focused' | 'returning'
let selectedChar = null;
let pickedTime = 0;
let rouletteEnd = 0;
let rouletteIndex = 0;
let rouletteInterval = 60; // ms between flips, ramps up

function pickRandom() {
  if (state !== 'overview') return;
  // Build pool: in no-repeat mode skip already-picked
  const pool = noRepeatMode
    ? CHARACTERS.filter(c => !c.pickedThisRound && !c.hidden && !c.leaving)
    : CHARACTERS;
  if (pool.length === 0) {
    // everyone has been picked — auto reset and re-pick after a beat
    resetRound();
    setTimeout(pickRandom, 600);
    return;
  }
  // roulette: cycle through randomly with increasing interval, then settle on one
  state = 'roulette';
  const target = pool[Math.floor(Math.random() * pool.length)];
  const duration = 1400; // ms
  const startTime = performance.now();
  rouletteIndex = Math.floor(Math.random() * pool.length);
  selectedChar = pool[rouletteIndex];
  pickBtn.disabled = true;

  const step = () => {
    const elapsed = performance.now() - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // ease out — interval grows
    const interval = 50 + progress * progress * 280;
    rouletteIndex = (rouletteIndex + 1) % pool.length;
    selectedChar = pool[rouletteIndex];
    // gently nudge camera toward current selection
    camera.tx = selectedChar.x + 7;
    camera.ty = selectedChar.y + 12;
    camera.tz = 1.6 + progress * 0.6;
    if (progress < 1) {
      setTimeout(step, interval);
    } else {
      selectedChar = target;
      zoomTo(selectedChar);
    }
  };
  setTimeout(step, 50);
}

function zoomTo(c) {
  selectedChar = c;
  state = 'zooming';
  camera.tx = c.x + 7;
  camera.ty = c.y + 8;
  camera.tz = 3.2;
  pickedTime = performance.now();
  setTimeout(() => {
    state = 'focused';
    showReveal(c);
  }, 600);
}

function returnToOverview() {
  state = 'returning';
  // if no-repeat mode is on, mark this character picked and send them home
  if (noRepeatMode && selectedChar && !selectedChar.pickedThisRound) {
    const ch = selectedChar;
    ch.pickedThisRound = true;
    ch.leaving = true;
    ch.leavingTo = nearestDoor(ch);
    if (typeof rebuildPanel === 'function') rebuildPanel();
  }
  camera.tx = VW / 2;
  camera.ty = VH / 2;
  camera.tz = 1;
  hideReveal();
  setTimeout(() => {
    state = 'overview';
    selectedChar = null;
    pickBtn.disabled = false;
  }, 700);
}

// =============================================================================
// UI BINDINGS
// =============================================================================
const pickBtn = document.getElementById('pick');
const revealEl = document.getElementById('reveal');
const nameEl = revealEl.querySelector('.name');
const activityEl = revealEl.querySelector('.activity');
const closeBtn = document.getElementById('close');

pickBtn.addEventListener('click', pickRandom);
closeBtn.addEventListener('click', returnToOverview);

window.addEventListener('keydown', (e) => {
  const tag = e.target.tagName;
  const isTyping = tag === 'INPUT' || tag === 'TEXTAREA';
  if ((e.code === 'Space' || e.code === 'Enter') && !isTyping) {
    e.preventDefault();
    if (state === 'overview') pickRandom();
  }
  if (e.code === 'Escape') {
    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
    } else if (state === 'focused') {
      returnToOverview();
    }
  }
});

function showReveal(ch) {
  nameEl.textContent = ch.name;
  if (ch.station === 'wander') {
    activityEl.textContent = ch.activity || 'просто гуляет';
  } else {
    activityEl.textContent = ch.activity || STATIONS[ch.station].activity;
  }
  revealEl.classList.add('show');
}
function hideReveal() {
  revealEl.classList.remove('show');
}

// =============================================================================
// MAIN LOOP
// =============================================================================
let lastFrameTime = performance.now();

function frame(now) {
  const t = now / 1000;
  const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
  lastFrameTime = now;

  // update characters + cats
  for (const ch of CHARACTERS) {
    if (ch.leaving) {
      updateLeavingChar(ch, dt);
    } else if (ch.station === 'wander') {
      updateWanderer(ch, dt, now);
    } else if (ch.station === 'campfire') {
      updateCampfireRoutine(ch, dt, now);
    } else if (ch.station === 'garden') {
      updateGardenRoutine(ch, dt, now);
    } else if (ch.station === 'kitchen') {
      updateKitchenRoutine(ch, dt, now);
    }
  }
  for (const cat of CATS) {
    updateCat(cat, dt, now);
  }

  // camera ease
  const ease = 0.12;
  camera.x += (camera.tx - camera.x) * ease;
  camera.y += (camera.ty - camera.y) * ease;
  camera.zoom += (camera.tz - camera.zoom) * ease;

  // clear (in case we zoom past edges)
  ctx.fillStyle = '#14141c';
  ctx.fillRect(0, 0, VW, VH);

  // apply camera
  ctx.save();
  ctx.translate(VW / 2, VH / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // background
  ctx.drawImage(bg, 0, 0);

  // ambient butterflies (behind characters when they're at top of scene, in front when bottom)
  for (const b of butterflies) {
    updateButterfly(b);
    drawButterfly(ctx, b, t);
  }

  // build draw order: sort stations + characters + cats by Y for depth
  const drawList = [];
  for (const key in STATIONS) {
    const s = STATIONS[key];
    drawList.push({ y: s.y + 14, draw: () => s.draw(ctx, s, t) });
  }
  for (const ch of CHARACTERS) {
    if (ch.hidden) continue;
    // jumping characters draw on top of their station so they appear in front of fire
    const isJumping = ch.routine && ch.routine.action === 'jump';
    const sortY = isJumping ? STATIONS[ch.station].y + 30 : ch.y + 22;
    drawList.push({ y: sortY, draw: () => drawCharacter(ctx, ch, t) });
  }
  for (const cat of CATS) {
    drawList.push({ y: cat.y + 10, draw: () => drawCat(ctx, cat, t) });
  }
  drawList.sort((a, b) => a.y - b.y);
  for (const item of drawList) item.draw();

  ctx.restore();

  // subtle vignette in canvas space (over zoom)
  const grad = ctx.createRadialGradient(VW / 2, VH / 2, VH * 0.4, VW / 2, VH / 2, VH * 0.85);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VW, VH);

  requestAnimationFrame(frame);
}

// =============================================================================
// SETTINGS PANEL
// =============================================================================
const settingsBtn = document.getElementById('settings');
const panel = document.getElementById('panel');
const closePanelBtn = document.getElementById('close-panel');
const charListEl = document.getElementById('char-list');
const addCharBtn = document.getElementById('add-char');
const noRepeatToggle = document.getElementById('no-repeat-toggle');
const resetRoundBtn = document.getElementById('reset-round');

settingsBtn.addEventListener('click', () => {
  rebuildPanel();
  panel.classList.add('open');
});
closePanelBtn.addEventListener('click', () => panel.classList.remove('open'));

addCharBtn.addEventListener('click', () => {
  const newChar = createRandomWanderer();
  CHARACTERS.push(newChar);
  saveToStorage();
  rebuildPanel({ focusLastInput: true });
});

noRepeatToggle.checked = noRepeatMode;
noRepeatToggle.addEventListener('change', (e) => {
  noRepeatMode = e.target.checked;
  // when turning off the mode, bring everyone back to the scene
  if (!noRepeatMode) resetRound();
  saveSettings();
  rebuildPanel();
});

resetRoundBtn.addEventListener('click', () => {
  resetRound();
  rebuildPanel();
});

function rebuildPanel(opts = {}) {
  charListEl.innerHTML = '';
  const anyPicked = CHARACTERS.some(c => c.pickedThisRound);
  resetRoundBtn.style.display = (noRepeatMode && anyPicked) ? 'block' : 'none';
  CHARACTERS.forEach((ch, idx) => {
    const row = document.createElement('div');
    row.className = 'char-row' + (ch.pickedThisRound ? ' picked' : '');

    // sprite swatch (preview the character)
    const swatch = document.createElement('canvas');
    swatch.className = 'char-swatch';
    swatch.width = 14; swatch.height = 22;
    const sctx = swatch.getContext('2d');
    sctx.imageSmoothingEnabled = false;
    sctx.drawImage(ch.sprite.idle, 0, 0);

    // info column
    const info = document.createElement('div');
    info.className = 'char-info';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'char-name';
    input.value = ch.name;
    input.maxLength = 24;
    input.spellcheck = false;
    input.addEventListener('input', (e) => {
      ch.name = e.target.value || ' ';
      saveToStorage();
    });
    input.addEventListener('blur', (e) => {
      if (!e.target.value.trim()) {
        ch.name = '?';
        e.target.value = '?';
        saveToStorage();
      }
    });

    const stationSelect = document.createElement('select');
    stationSelect.className = 'char-station-select';
    // station options (jobs at fixed locations)
    Object.keys(STATIONS).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = STATIONS[key].activity;
      if (ch.station === key) opt.selected = true;
      stationSelect.appendChild(opt);
    });
    // wander option (no fixed spot — just walks around)
    const wanderOpt = document.createElement('option');
    wanderOpt.value = 'wander';
    wanderOpt.textContent = '— просто гуляет —';
    if (ch.station === 'wander') wanderOpt.selected = true;
    stationSelect.appendChild(wanderOpt);
    stationSelect.addEventListener('change', (e) => {
      assignStation(ch, e.target.value);
      rebuildPanel();
    });

    info.appendChild(input);
    info.appendChild(stationSelect);

    // remove
    const removeBtn = document.createElement('button');
    removeBtn.className = 'char-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'удалить';
    if (CHARACTERS.length <= 1) removeBtn.disabled = true;
    removeBtn.addEventListener('click', () => {
      if (CHARACTERS.length <= 1) return;
      const removed = CHARACTERS.splice(idx, 1)[0];
      if (selectedChar === removed) {
        selectedChar = null;
        if (state !== 'overview') returnToOverview();
      }
      saveToStorage();
      rebuildPanel();
    });

    row.appendChild(swatch);
    row.appendChild(info);
    row.appendChild(removeBtn);
    charListEl.appendChild(row);
  });

  if (opts.focusLastInput) {
    const inputs = charListEl.querySelectorAll('.char-name');
    const last = inputs[inputs.length - 1];
    if (last) { last.focus(); last.select(); }
  }
}

requestAnimationFrame(frame);

</script>
